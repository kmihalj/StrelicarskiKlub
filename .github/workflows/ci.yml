name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: skd_test
          MYSQL_USER: skd
          MYSQL_PASSWORD: skd
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none
          extensions: mbstring, dom, fileinfo, pdo_mysql

      - name: Copy environment
        run: cp .env.example .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Application key
        run: php artisan key:generate

      - name: Wait for MySQL
        run: |
          php -r '
          $ok = false;
          for ($i = 0; $i < 30; $i++) {
              try {
                  new PDO("mysql:host=127.0.0.1;port=3306;dbname=skd_test", "skd", "skd");
                  $ok = true;
                  break;
              } catch (Throwable $e) {
                  sleep(2);
              }
          }
          if (!$ok) {
              fwrite(STDERR, "MySQL is not ready.\n");
              exit(1);
          }'

      - name: Run migrations and seeders
        env:
          APP_ENV: testing
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: skd_test
          DB_USERNAME: skd
          DB_PASSWORD: skd
        run: php artisan migrate --seed --force

      - name: Run tests
        env:
          APP_ENV: testing
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: skd_test
          DB_USERNAME: skd
          DB_PASSWORD: skd
        run: php artisan test

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build
